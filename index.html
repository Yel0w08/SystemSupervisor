<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yel0w's System Supervisor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/Images/WebSiteIcon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
</head>
<body>
<header>
<nav>
</nav>
</header>
<h1 class="TitleYellow">System Supervisor</h1>
<div class="SystemsStatus">
    <p id="pingDisplay">Portfolio [yel0w.fr] : Calculating...</p>
    <p id="pingDisplay2">Portfolio [yel0w.com] : Calculating...</p>
</div>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script>
var sites = [
    {url: "https://yel0w.fr", name: "Portfolio [yel0w.fr]", displayId: "pingDisplay"},
    {url: "https://Yel0w.com", name: "Portfolio [yel0w.com]", displayId: "pingDisplay2"}
];

function checkPing(site) {
    var ping = new Date();
    $.ajax({
        url: site.url,
        cache: false,
        success: function(output){
            var pingPortfolio = new Date() - ping;
            console.log("Ping/Latency for " + site.url + ": " + pingPortfolio + " ms");
            $("#" + site.displayId).css("color", "lightgreen").text(site.name + " : Online - Ping: " + pingPortfolio + " ms");
        },
        error: function(){
            console.log("Server " + site.url + " is unreachable");
            $("#" + site.displayId).css("color", "red").text(site.name + " : Offline");
        }
    });
}

function checkAllPings() {
    sites.forEach(site => checkPing(site));
}

checkAllPings(); // initial check
setInterval(checkAllPings, 5000); // refresh every 5 seconds
</script>
</body>
</html>
