<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yel0w's System Supervisor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/Images/WebSiteIcon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
</head>
<body>
<header>
<nav>
</nav>
</header>
<h1 class="TitleYellow">System Supervisor</h1>
<div class="SystemsStatus">
    <p id="pingDisplay">Portfolio [yel0w.fr] : Calculating...</p>
    <p id="pingDisplay2">Portfolio [yel0w.com] : Calculating...</p>
</div>
<script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script>
function checkPing(url, name) {
    var displayId = (name === "Portfolio [yel0w.fr]") ? "pingDisplay" : "pingDisplay2";
    var ping = new Date();
    $.ajax({
        url: url,
        cache: false,
        success: function(output){
            var pingPortfolio = new Date() - ping;
            console.log("Ping/Latency for " + url + ": " + pingPortfolio + " ms");
            $("#" + displayId).css("color", "lightgreen").text(name + " : Online - Ping: " + pingPortfolio + " ms");
        },
        error: function(){
            console.log("Server " + url + " is unreachable");
            $("#" + displayId).css("color", "red").text(name + " : Offline");
        }
    });
}
checkPing("https://yel0w.fr", "Portfolio [yel0w.fr]"); // initial check
checkPing("https://Yel0w.com", "Portfolio [yel0w.com]"); 
setInterval(function() { 
    checkPing("https://yel0w.fr", "Portfolio [yel0w.fr]"); 
    checkPing("https://Yel0w.com", "Portfolio [yel0w.com]"); 
}, 5000); // refresh every 5 seconds

</script>
</body>
</html>
