<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Supervisor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="TitleYellow">System Supervisor</h1>
    <p>Monitoring websites for uptime and response times.</p>

    <div id="supervisor">
        <div class="site" data-url="https://yel0w.fr/">
            <h2>https://yel0w.fr/</h2>
            <p>Status: <span id="status-yel0w">Checking...</span></p>
            <p>Response Time: <span id="time-yel0w">-</span></p>
            <p>Last Checked: <span id="last-yel0w">-</span></p>
        </div>

        <div class="site" data-url="https://tealib.yel0w.fr/">
            <h2>https://tealib.yel0w.fr/</h2>
            <p>Status: <span id="status-tealib">Checking...</span></p>
            <p>Response Time: <span id="time-tealib">-</span></p>
            <p>Last Checked: <span id="last-tealib">-</span></p>
        </div>
    </div>

    <script src="supervisor.js"></script>
</body>
</html>
